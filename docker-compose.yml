version: '3.9'

services:

  db:
    image: postgres:16
    container_name: taller_db
    environment:
      POSTGRES_DB: taller_db
      POSTGRES_USER: taller_user
      POSTGRES_PASSWORD: taller2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - taller_net
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: taller_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=taller_db
      - DB_USER=taller_user
      - DB_PASSWORD=taller2026
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db
    networks:
      - taller_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: taller_frontend
    ports:
      - "3000:80"
    networks:
      - taller_net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  taller_net:
    driver: bridge