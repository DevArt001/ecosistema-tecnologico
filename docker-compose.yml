version: '3.8'

services:
  taller_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taller
      POSTGRES_USER: taller
      POSTGRES_PASSWORD: taller123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - taller_net

  taller_backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - taller_db
    environment:
      DATABASE_URL: postgresql://taller:taller123@taller_db:5432/taller
    networks:
      - taller_net

  taller_frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - taller_backend
    environment:
      BACKEND_HOST: taller_backend
    networks:
      - taller_net

volumes:
  postgres_data:

networks:
  taller_net:
    driver: bridge
